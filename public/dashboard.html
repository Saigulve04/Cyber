<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyber Cafe - Dashboard</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="logo">Cyber<span>Zone</span></a>
    <div class="nav-links">
      <span class="nav-item" id="user-greeting" style="color: var(--accent-color);">Hello, Player</span>
      <button id="logout-btn" class="btn btn-danger" style="margin-left: 1rem;">Disconnect</button>
    </div>
  </nav>

  <div class="container" style="justify-content: flex-start; padding-top: 100px;">
    
    <div style="width: 100%; display: flex; justify-content: space-between; align-items: flex-end; margin-top: 2rem;">
      <div>
        <h2 style="font-family: 'Outfit', sans-serif; font-size: 2.5rem; margin-bottom: 0.5rem;">Command Center</h2>
        <p style="color: var(--text-secondary);">Your personal terminal and session info.</p>
      </div>
    </div>

    <div id="loading" style="margin-top: 4rem; text-align: center; color: var(--accent-color); font-size: 1.2rem;">
      Initializing Connection...
    </div>

    <div id="dashboard-content" class="dashboard-grid" style="display: none;">
      <!-- Stats populated by JS -->
      <div class="dashboard-card">
        <h3>Available Balance</h3>
        <div class="value" id="stat-balance">$0.00</div>
      </div>
      
      <div class="dashboard-card">
        <h3>Total Hours Played</h3>
        <div class="value" id="stat-hours">0</div>
      </div>
      
      <div class="dashboard-card">
        <h3>Current Status</h3>
        <div class="value" id="stat-session" style="color: #ff4b4b; font-size: 1.8rem; margin-top: 0.5rem;">Offline</div>
      </div>

      <div class="dashboard-card">
        <h3>Favorite Game</h3>
        <div class="value" id="stat-game" style="font-size: 1.8rem; margin-top: 0.5rem; color: #fff;">None</div>
      </div>
    </div>
    
  </div>

  <script src="/js/dashboard.js"></script>
</body>
</html>
