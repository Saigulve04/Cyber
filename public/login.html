<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyber Cafe - Login</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="logo">Cyber<span>Zone</span></a>
    <div class="nav-links">
      <a href="/" class="nav-item">Home</a>
      <a href="/signup.html" class="btn btn-primary">Sign Up</a>
    </div>
  </nav>

  <div class="container">
    <div class="glass-panel">
      <h2>Welcome Back</h2>
      <p class="subtitle">Enter your credentials to continue</p>
      
      <div id="error-alert" class="error-msg"></div>

      <form id="login-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="form-control" required placeholder="player@domain.com">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary form-btn">Authenticate & Enter</button>
      </form>
      
      <div class="form-footer">
        Don't have an account? <a href="/signup.html">Register Now</a>
      </div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
